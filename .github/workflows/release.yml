name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-android-ccache
          max-size: 2G
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks
      - name: Build APK
        run: flutter build apk --release
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Build AppBundle
        run: flutter build appbundle --release
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Rename artifacts
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk GrooveForge-${{ github.ref_name }}.apk
          mv build/app/outputs/bundle/release/app-release.aab GrooveForge-${{ github.ref_name }}.aab
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            GrooveForge-${{ github.ref_name }}.apk
            GrooveForge-${{ github.ref_name }}.aab

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libblkid-dev liblzma-dev libgcrypt20-dev libmpv-dev \
            libasound2-dev \
            libx11-dev

      # The VST3 SDK is gitignored (too large to commit). Cache the clone so
      # subsequent CI runs skip the download entirely.
      # public.sdk is a git submodule — must use --recurse-submodules.
      - name: Cache VST3 SDK
        id: cache-vst3sdk-linux
        uses: actions/cache@v4
        with:
          path: packages/flutter_vst3/vst3sdk
          key: vst3sdk-recurse-${{ hashFiles('packages/flutter_vst3/dart_vst_host/linux/CMakeLists.txt') }}

      - name: Clone VST3 SDK
        if: steps.cache-vst3sdk-linux.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --recurse-submodules --shallow-submodules \
            https://github.com/steinbergmedia/vst3sdk.git \
            packages/flutter_vst3/vst3sdk

      # Cache the VST3 SDK object files — the SDK is hundreds of files and the
      # first cold compile takes several minutes. Subsequent runs are near-instant.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-linux-vst3-ccache
          max-size: 1G

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # dart_vst_host is declared as an FFI plugin (ffiPlugin: true).
      # Flutter builds and bundles libdart_vst_host.so automatically —
      # no manual cmake / make / cp steps needed.
      - name: Build Linux
        run: flutter build linux --release
        env:
          # Let ccache intercept the compiler for the VST3 SDK compilation.
          CC: ccache gcc
          CXX: ccache g++
          # Pass the absolute SDK path explicitly so CMakeLists.txt does not
          # need to resolve symlinks (REALPATH does not follow junctions on
          # some platforms, and the cloned SDK version may differ from local).
          VST3_SDK_DIR: ${{ github.workspace }}/packages/flutter_vst3/vst3sdk
      - name: Package .deb
        run: |
          VERSION=${{ github.ref_name }}
          VERSION_CLEAN=${VERSION#v}
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/grooveforge
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/512x512/apps
          mkdir -p deb/DEBIAN
          
          cp -r build/linux/x64/release/bundle/* deb/usr/share/grooveforge/
          cp icon.png deb/usr/share/icons/hicolor/512x512/apps/grooveforge.png
          ln -s /usr/share/grooveforge/grooveforge deb/usr/bin/grooveforge
          
          cat <<EOF > deb/DEBIAN/control
          Package: grooveforge
          Version: $VERSION_CLEAN
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: fluidsynth, libasound2, libx11-6
          Maintainer: Yann
          Description: GrooveForge MIDI Synthesizer
          EOF
          
          cat <<EOF > deb/usr/share/applications/grooveforge.desktop
          [Desktop Entry]
          Name=GrooveForge
          Exec=grooveforge
          Icon=grooveforge
          Type=Application
          Categories=Audio;Music;
          EOF
          
          dpkg-deb --build deb GrooveForge-Linux-$VERSION.deb
      - name: Zip Bundle
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../GrooveForge-Linux-${{ github.ref_name }}-bundle.zip .
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            GrooveForge-Linux-${{ github.ref_name }}.deb
            GrooveForge-Linux-${{ github.ref_name }}-bundle.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # The VST3 SDK is gitignored (too large to commit). Cache the clone so
      # subsequent CI runs skip the download entirely.
      # public.sdk is a git submodule — must use --recurse-submodules.
      - name: Cache VST3 SDK
        id: cache-vst3sdk-windows
        uses: actions/cache@v4
        with:
          path: packages/flutter_vst3/vst3sdk
          key: vst3sdk-recurse-${{ hashFiles('packages/flutter_vst3/dart_vst_host/windows/CMakeLists.txt') }}

      - name: Clone VST3 SDK
        if: steps.cache-vst3sdk-windows.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --recurse-submodules --shallow-submodules `
            https://github.com/steinbergmedia/vst3sdk.git `
            packages/flutter_vst3/vst3sdk

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
        env:
          # CMake's get_filename_component(REALPATH) does not follow Windows
          # directory junctions used by Flutter's .plugin_symlinks, so we pass
          # the absolute path explicitly to bypass junction resolution entirely.
          VST3_SDK_DIR: ${{ github.workspace }}/packages/flutter_vst3/vst3sdk
      - name: Zip Artifact
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath GrooveForge-Windows-${{ github.ref_name }}.zip
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: GrooveForge-Windows-${{ github.ref_name }}.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Build macOS
        run: flutter build macos --release
      - name: Zip App
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../GrooveForge-macOS-${{ github.ref_name }}.zip GrooveForge.app
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: GrooveForge-macOS-${{ github.ref_name }}.zip

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Build iOS
        run: flutter build ios --release --no-codesign
      - name: Package IPA (Unsigned)
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r GrooveForge-iOS-${{ github.ref_name }}-unsigned.ipa Payload/
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: GrooveForge-iOS-${{ github.ref_name }}-unsigned.ipa

  create-release:
    needs: [build-android, build-linux, build-windows, build-macos, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract Latest Changelog
        id: extract_changelog
        run: |
          # Extract the first version section from CHANGELOG.md
          # This takes everything between the first '## [' and the second '## ['
          # Excluding the header line itself
          awk '/^## \[/ { if (count++) exit; next } count' CHANGELOG.md > latest_changelog.txt
          {
            echo 'CHANGELOG_CONTENT<<EOF'
            cat latest_changelog.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android-build/*
            artifacts/linux-build/*
            artifacts/windows-build/*
            artifacts/macos-build/*
            artifacts/ios-build/*
          body: |
            ## What's Changed (Changelog)
            ${{ steps.extract_changelog.outputs.CHANGELOG_CONTENT }}
            
          generate_release_notes: true
          draft: false
          prerelease: false
