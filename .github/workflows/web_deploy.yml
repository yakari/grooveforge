name: Build & Deploy Web

# Trigger on pushes to version tags or manually via the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to write to the gh-pages branch.
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Flutter setup ───────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # shared_preferences >=2.5.4 requires Dart ^3.9.0 (Flutter 3.41+).
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 3. Build web (WASM) ────────────────────────────────────────────────
      # Web app lives at https://<user>.github.io/<repo>/demo/ — base-href must
      # include the /demo/ segment so asset URLs and the service worker resolve.
      #
      # --wasm compiles Dart to WebAssembly (dart2wasm) instead of JavaScript.
      # Requires Flutter >= 3.22 on the stable channel.
      - name: Build Flutter web (WASM)
        run: |
          flutter build web \
            --release \
            --wasm \
            --base-href "/${{ github.event.repository.name }}/demo/"

      # ── 4. Assemble site: static marketing/docs at repo root, Flutter under demo/ ──
      - name: Assemble GitHub Pages bundle
        run: |
          REPO="${{ github.event.repository.name }}"
          rm -rf gh_pages_bundle
          mkdir -p gh_pages_bundle/demo gh_pages_bundle/docs/site gh_pages_bundle/assets/screenshots
          cp -r website/. gh_pages_bundle/
          cp -r build/web/. gh_pages_bundle/demo/
          cp docs/site/features.md docs/site/features.fr.md docs/site/privacy.md docs/site/privacy.fr.md gh_pages_bundle/docs/site/
          cp splashscreen.png icon.png gh_pages_bundle/assets/
          cp assets/screenshots/*.png gh_pages_bundle/assets/screenshots/

      # ── 5. Deploy to gh-pages ──────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh_pages_bundle
          # Keeps gh-pages history lean — each deploy is a clean publish.
          force_orphan: true
