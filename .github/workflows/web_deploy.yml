name: Build & Deploy Web

# Trigger on pushes to version tags or manually via the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to write to the gh-pages branch.
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Flutter setup ───────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # shared_preferences >=2.5.4 requires Dart ^3.9.0 (Flutter 3.41+).
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 3. Build web (WASM) ────────────────────────────────────────────────
      # --base-href must match the GitHub Pages sub-path, e.g.:
      #   https://<user>.github.io/<repo>/  →  --base-href /<repo>/
      # Change the value below if your repo name is different.
      #
      # --wasm compiles Dart to WebAssembly (dart2wasm) instead of JavaScript.
      # Requires Flutter >= 3.22 on the stable channel.
      - name: Build Flutter web (WASM)
        run: |
          flutter build web \
            --release \
            --wasm \
            --base-href "/${{ github.event.repository.name }}/"

      # ── 4. Copy docs (single source of truth for /features and /privacy) ──
      # The HTML shells in web/features/ and web/privacy/ fetch these .md files
      # at runtime via marked.js, so they must be present in the build output.
      - name: Copy docs into build
        run: cp -r docs build/web/docs

      # ── 5. Deploy to gh-pages ──────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          # Keeps gh-pages history lean — each deploy is a clean publish.
          force_orphan: true
