name: dart_vst_host
description: Minimal VST3 host via FFI wrapping Steinberg hosting helpers.
  Declared as a Flutter FFI plugin so that `flutter build linux` automatically
  compiles the native library and bundles it — no manual cmake/make step needed.
version: 0.1.0
environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  meta: ^1.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter

# Declares this package as a Flutter FFI plugin for Linux and Windows.
# Flutter's build system automatically configures the platform CMakeLists.txt,
# compiles the native library, and bundles it — no manual cmake/make steps.
#
# Audio: ALSA on Linux. Windows (WASAPI) and macOS (CoreAudio) can be added
# later via platform-specific source files.
# Editor GUI: floating X11 window on Linux.  macOS NSView embedding via
# FlutterPlatformView is a viable future enhancement.
#
# macOS is intentionally omitted here: Flutter macOS uses CocoaPods, which
# requires a .podspec file that our CMake-only approach does not provide.
# Until a proper podspec + CoreAudio backend are added, macOS VST3 hosting
# falls back to the no-op stub (VstHostService from vst_host_service_stub.dart).
# macOS: dart_vst_host is NOT declared as a CocoaPods plugin here.
# The libdart_vst_host.dylib is loaded at runtime via Dart FFI
# (DynamicLibrary.open('libdart_vst_host.dylib')). Xcode copies the
# pre-built dylib from macos/Runner/ into the app bundle via the
# Runner target's Copy Files build phase.
flutter:
  plugin:
    platforms:
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
