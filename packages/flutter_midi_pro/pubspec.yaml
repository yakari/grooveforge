name: flutter_midi_pro
description: The `flutter_midi_pro` plugin provides functions for loading
  SoundFont (.sf2) files, changing instruments and playing notes with midi
  commands.

version: 3.1.6
repository: https://github.com/MelihHakanPektas/flutter_midi_pro

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.5
  plugin_platform_interface: ^2.1.8
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.melihhakanpektas.flutter_midi_pro
        pluginClass: FlutterMidiProPlugin
      ios:
        pluginClass: FlutterMidiProPlugin
      macos:
        pluginClass: FlutterMidiProPlugin
      web:
        pluginClass: FlutterMidiProWeb
        fileName: flutter_midi_pro_web.dart

topics:
  - midi
  - soundfont
  - soundbank
  - sf2
